# Wealthfolio - Production Docker Compose (custom fork build)
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Rebuild: docker compose build && docker compose up -d
# Logs:    docker compose logs -f

services:
  wealthfolio:
    build: .
    image: wealthfolio-custom
    container_name: wealthfolio-custom
    restart: unless-stopped
    ports:
      - "8899:8088"
    volumes:
      - ./data:/data
    env_file:
      - ./secrets/.env.compose
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8088/api/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M
